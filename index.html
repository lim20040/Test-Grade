<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMR 자동 채점 시스템</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 500px;
            max-width: 100%;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .setup-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px dashed #ddd;
        }
        .setup-group input {
            width: 80px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            text-align: center;
            font-size: 16px;
        }
        .row-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            background: #eee;
            padding: 8px;
            border-radius: 5px;
            margin-bottom: 10px;
            text-align: center;
        }
        .question-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding: 5px;
            border-bottom: 1px solid #f0f0f0;
        }
        .question-num {
            flex: 1;
            font-weight: bold;
            color: #555;
            text-align: center;
        }
        .input-box {
            flex: 2;
            display: flex;
            justify-content: center;
        }
        .question-row input {
            width: 70px;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
        }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-blue { background-color: #2196F3; color: white; }
        .btn-blue:hover { background-color: #1976D2; }
        .btn-green { background-color: #4CAF50; color: white; width: 100%; margin-top: 15px; font-size: 16px; padding: 12px; }
        .btn-green:hover { background-color: #45a049; }
        
        #result-section { text-align: center; }
        .score-display { font-size: 36px; font-weight: bold; color: #E53935; margin: 20px 0; }
        .feedback { margin-bottom: 20px; color: #555; font-size: 15px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <div id="input-section">
        <h2>OMR 문항 설정 및 입력</h2>
        
        <div class="setup-group">
            <label for="question-count">총 문항 수 입력:</label>
            <input type="number" id="question-count" min="1" max="100" value="5">
            <button type="button" id="generate-btn" class="btn-blue">입력란 생성</button>
        </div>
        
        <form id="omr-form" style="display: none;">
            <div class="row-header">
                <div style="flex:1;">번호</div>
                <div style="flex:2;">정답 (기준)</div>
                <div style="flex:2;">학생 답안</div>
            </div>
            
            <div id="dynamic-questions"></div>
            
            <button type="submit" class="btn-green">채점하기</button>
        </form>
    </div>

    <div id="result-section" style="display: none;">
        <h2>채점 결과</h2>
        <div class="score-display" id="score-display">0점</div>
        <div class="feedback" id="feedback-display"></div>
        
        <button type="button" id="edit-btn" class="btn-blue" style="width: 100%; padding: 12px;">성적 수정하기</button>
    </div>
</div>

<script>
    const generateBtn = document.getElementById('generate-btn');
    const questionCountInput = document.getElementById('question-count');
    const omrForm = document.getElementById('omr-form');
    const dynamicQuestions = document.getElementById('dynamic-questions');
    
    const inputSection = document.getElementById('input-section');
    const resultSection = document.getElementById('result-section');
    const scoreDisplay = document.getElementById('score-display');
    const feedbackDisplay = document.getElementById('feedback-display');
    const editBtn = document.getElementById('edit-btn');

    // [입력란 생성] 버튼 클릭 시 -> 문항 수만큼 정답/학생 입력란 동적 생성
    generateBtn.addEventListener('click', function() {
        const count = parseInt(questionCountInput.value);
        if (isNaN(count) || count < 1) {
            alert('올바른 문항 수를 입력해주세요.');
            return;
        }

        dynamicQuestions.innerHTML = ''; // 기존 생성된 입력란 초기화

        for (let i = 1; i <= count; i++) {
            const row = document.createElement('div');
            row.className = 'question-row';
            row.innerHTML = `
                <div class="question-num">${i}번</div>
                <div class="input-box">
                    <input type="number" id="ans-${i}" min="1" max="5" required placeholder="정답">
                </div>
                <div class="input-box">
                    <input type="number" id="stud-${i}" min="1" max="5" required placeholder="학생">
                </div>
            `;
            dynamicQuestions.appendChild(row);
        }

        omrForm.style.display = 'block'; // 폼 보이기
    });

    // [채점하기] 버튼 클릭 시 (폼 제출)
    omrForm.addEventListener('submit', function(event) {
        event.preventDefault(); // 페이지 새로고침 방지 (입력 데이터 유지의 핵심)

        const count = parseInt(questionCountInput.value);
        let correctCount = 0;
        let incorrectQuestions = [];

        // 동적으로 생성된 모든 문항을 돌며 채점
        for (let i = 1; i <= count; i++) {
            const answerVal = document.getElementById(`ans-${i}`).value;
            const studentVal = document.getElementById(`stud-${i}`).value;

            if (answerVal === studentVal) {
                correctCount++;
            } else {
                incorrectQuestions.push(i);
            }
        }

        // 점수 계산 (만점은 100점 기준 소수점 둘째자리까지 처리)
        const finalScore = ((correctCount / count) * 100).toFixed(1);

        // 결과 화면 렌더링
        scoreDisplay.innerText = `${parseFloat(finalScore)}점`;
        
        if (incorrectQuestions.length === 0) {
            feedbackDisplay.innerHTML = `총 ${count}문항 중 ${correctCount}문항 맞춤<br><strong style="color:#4CAF50;">만점입니다!</strong>`;
        } else {
            feedbackDisplay.innerHTML = `총 ${count}문항 중 ${correctCount}문항 맞춤<br><span style="color:#E53935;">틀린 문항: ${incorrectQuestions.join(', ')}번</span>`;
        }

        // 화면 전환: 입력란 가리고 결과창 보여주기
        inputSection.style.display = 'none';
        resultSection.style.display = 'block';
    });

    // [성적 수정하기] 버튼 클릭 시
    editBtn.addEventListener('click', function() {
        // 화면 전환: 결과창 가리고 기존 입력창 다시 보여주기
        resultSection.style.display = 'none';
        inputSection.style.display = 'block';

        // 💡 중요: DOM 요소나 Form을 reset하지 않았기 때문에 
        // 생성되어 있던 입력칸들과 사용자가 적었던 숫자들이 그대로 남아있습니다.
    });
</script>

</body>
</html>
